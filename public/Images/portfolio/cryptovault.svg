<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="defiBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020914" />
      <stop offset="60%" stop-color="#05172b" />
      <stop offset="100%" stop-color="#01050a" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#00F2FE" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    
    <filter id="tealGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#defiBg)" />
  
  <!-- Glowing Background Orbs -->
  <circle cx="200" cy="180" r="160" fill="#38bdf8" opacity="0.1" filter="url(#tealGlow)"/>
  <circle cx="600" cy="420" r="200" fill="#10b981" opacity="0.08" filter="url(#tealGlow)"/>

  <!-- Isometric Network Grid / Connection Nodes -->
  <g opacity="0.1" stroke="#38bdf8" stroke-width="1.5">
    <!-- Network Lines -->
    <line x1="100" y1="100" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="250" y2="350"/>
    <line x1="250" y1="350" x2="450" y2="400"/>
    <line x1="450" y1="400" x2="600" y2="300"/>
    <line x1="600" y1="300" x2="520" y2="150"/>
    <line x1="520" y1="150" x2="300" y2="180"/>
    
    <!-- Connection Points -->
    <circle cx="100" cy="100" r="4" fill="#38bdf8"/>
    <circle cx="300" cy="180" r="6" fill="#38bdf8" filter="url(#tealGlow)"/>
    <circle cx="250" cy="350" r="5" fill="#38bdf8"/>
    <circle cx="450" cy="400" r="6" fill="#10b981" filter="url(#tealGlow)"/>
    <circle cx="600" cy="300" r="4" fill="#38bdf8"/>
    <circle cx="520" cy="150" r="5" fill="#38bdf8"/>
  </g>

  <!-- DEFI INTERFACE BLOCKS -->
  <g filter="url(#shadow)">
    <!-- Main Trading / Swap Card -->
    <rect x="80" y="80" width="360" height="440" rx="20" fill="#0d1b2e" fill-opacity="0.85" stroke="rgba(56,189,248,0.15)" stroke-width="1.5"/>
    
    <!-- Connected Badge -->
    <rect x="100" y="105" width="130" height="24" rx="12" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <circle cx="114" cy="117" r="4" fill="#10b981" filter="url(#tealGlow)"/>
    <text x="126" y="121" fill="#10b981" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.5">MAINNET: CONNECTED</text>
    
    <!-- Swap Label -->
    <text x="100" y="170" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">Instant Swap</text>
    
    <!-- Input Field: Pay -->
    <rect x="100" y="195" width="320" height="85" rx="12" fill="#07101c" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="120" y="220" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="600">YOU PAY</text>
    <text x="120" y="258" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="700">1.45</text>
    <!-- ETH Selector -->
    <rect x="310" y="215" width="90" height="34" rx="17" fill="#182c47" />
    <text x="355" y="237" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">ETH ▼</text>
    
    <!-- Swap Icon circle -->
    <circle cx="260" cy="295" r="18" fill="#38bdf8" filter="url(#tealGlow)"/>
    <path d="M 256,290 L 260,286 L 264,290 M 260,286 L 260,302 M 264,300 L 260,304 L 256,300" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

    <!-- Input Field: Receive -->
    <rect x="100" y="310" width="320" height="85" rx="12" fill="#07101c" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="120" y="335" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="600">YOU RECEIVE</text>
    <text x="120" y="373" fill="#34d399" font-family="system-ui, sans-serif" font-size="28" font-weight="700">4,821.50</text>
    <!-- USDC Selector -->
    <rect x="310" y="330" width="90" height="34" rx="17" fill="#182c47" />
    <text x="355" y="352" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">USDC ▼</text>

    <!-- Slippage Tolerance info -->
    <text x="110" y="420" fill="rgba(255,255,255,0.3)" font-family="system-ui, sans-serif" font-size="10">Slippage Tolerance: <tspan fill="#38bdf8">0.5%</tspan></text>
    
    <!-- Action Button -->
    <rect x="100" y="445" width="320" height="50" rx="25" fill="url(#tealGrad)" filter="url(#tealGlow)" cursor="pointer"/>
    <text x="260" y="476" fill="#07101c" font-family="system-ui, sans-serif" font-size="15" font-weight="800" text-anchor="middle">SWAP FUNDS</text>
  </g>
  
  <!-- FLOATING CHARTS CARD (Right Overlay) -->
  <g filter="url(#shadow)">
    <!-- Card Frame -->
    <rect x="460" y="100" width="260" height="240" rx="16" fill="#081424" fill-opacity="0.9" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    
    <!-- Card Header -->
    <text x="480" y="130" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">ETH/USDC Chart</text>
    <text x="480" y="146" fill="#34d399" font-family="system-ui, sans-serif" font-size="11" font-weight="600">+$124.50 (3.8%) ▲</text>

    <!-- Candlestick Chart Area -->
    <!-- Grid -->
    <line x1="480" y1="180" x2="700" y2="180" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="480" y1="210" x2="700" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="480" y1="240" x2="700" y2="240" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="480" y1="270" x2="700" y2="270" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    
    <!-- Candlesticks (Green & Red) -->
    <!-- Candle 1: Red -->
    <line x1="500" y1="200" x2="500" y2="240" stroke="#f87171" stroke-width="1.5"/>
    <rect x="496" y="210" width="8" height="20" fill="url(#roseGrad)" rx="1"/>
    
    <!-- Candle 2: Green -->
    <line x1="530" y1="180" x2="530" y2="230" stroke="#34d399" stroke-width="1.5"/>
    <rect x="526" y="190" width="8" height="30" fill="url(#emeraldGrad)" rx="1"/>

    <!-- Candle 3: Green -->
    <line x1="560" y1="160" x2="560" y2="210" stroke="#34d399" stroke-width="1.5"/>
    <rect x="556" y="170" width="8" height="25" fill="url(#emeraldGrad)" rx="1"/>

    <!-- Candle 4: Red -->
    <line x1="590" y1="175" x2="590" y2="225" stroke="#f87171" stroke-width="1.5"/>
    <rect x="586" y="185" width="8" height="25" fill="url(#roseGrad)" rx="1"/>

    <!-- Candle 5: Green -->
    <line x1="620" y1="150" x2="620" y2="200" stroke="#34d399" stroke-width="1.5"/>
    <rect x="616" y="160" width="8" height="30" fill="url(#emeraldGrad)" rx="1"/>

    <!-- Candle 6: Green -->
    <line x1="650" y1="130" x2="650" y2="180" stroke="#34d399" stroke-width="1.5"/>
    <rect x="646" y="140" width="8" height="25" fill="url(#emeraldGrad)" rx="1" filter="url(#tealGlow)"/>

    <!-- Line chart smooth trend overlay -->
    <path d="M 500,220 Q 530,205 560,180 T 620,175 T 650,150" fill="none" stroke="#38bdf8" stroke-width="2.5" filter="url(#tealGlow)"/>
  </g>

  <!-- WALLET BALANCE CARD (Lower Right Overlay) -->
  <g filter="url(#shadow)">
    <rect x="460" y="360" width="260" height="130" rx="16" fill="#0b172a" fill-opacity="0.9" stroke="rgba(16,185,129,0.15)" stroke-width="1.5"/>
    
    <text x="480" y="390" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-transform="uppercase" letter-spacing="0.5">Total Assets TVL</text>
    <text x="480" y="425" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="800">$2,492,084</text>
    
    <!-- Mini green sparks trend -->
    <path d="M 480,460 L 510,455 L 530,465 L 560,450 L 580,458 L 610,442 L 640,445" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" filter="url(#tealGlow)"/>
    
    <rect x="660" y="440" width="40" height="18" rx="9" fill="rgba(52,211,153,0.1)"/>
    <text x="680" y="452" fill="#34d399" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">LIVE</text>
  </g>
</svg>
