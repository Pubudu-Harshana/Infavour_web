<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02000a" />
      <stop offset="50%" stop-color="#050a1d" />
      <stop offset="100%" stop-color="#010207" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF066" />
      <stop offset="50%" stop-color="#FF7B00" />
      <stop offset="100%" stop-color="#FF2A00" />
    </linearGradient>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,123,0,0.15)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.6)" />
    </linearGradient>
    
    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="blurBehind" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#spaceBg)" />

  <!-- Stars / Particles -->
  <g opacity="0.4">
    <circle cx="120" cy="180" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="340" cy="90" r="1" fill="#fff" opacity="0.6"/>
    <circle cx="280" cy="240" r="2.5" fill="#FF7B00" opacity="0.5" filter="url(#hyperGlow)"/>
    <circle cx="560" cy="120" r="1.5" fill="#fff"/>
    <circle cx="710" cy="200" r="1" fill="#fff" opacity="0.7"/>
    <circle cx="680" cy="380" r="2" fill="#00C6FF" opacity="0.5" filter="url(#hyperGlow)"/>
    <circle cx="150" cy="420" r="1.5" fill="#fff"/>
    <circle cx="220" cy="480" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="490" cy="450" r="2.5" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Glowing Nebulae Background -->
  <circle cx="400" cy="250" r="200" fill="#FF5500" opacity="0.1" filter="url(#hyperGlow)"/>
  <circle cx="400" cy="250" r="300" fill="#7B2FF7" opacity="0.08" filter="url(#hyperGlow)"/>

  <!-- Orbital Paths & HUD Systems -->
  <g opacity="0.4">
    <circle cx="400" cy="250" r="180" fill="none" stroke="#00C6FF" stroke-width="1" stroke-dasharray="8,6"/>
    <circle cx="400" cy="250" r="230" fill="none" stroke="#FF7B00" stroke-width="1.5" stroke-dasharray="3,15"/>
    <circle cx="400" cy="250" r="130" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    
    <!-- Crosshairs -->
    <line x1="400" y1="50" x2="400" y2="450" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="200" y1="250" x2="600" y2="250" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="5,5"/>
  </g>

  <!-- Central Cosmic Element (3D Glowing Sphere/Planet Concept) -->
  <g transform="translate(400, 250)">
    <!-- Aura Shadow Glow -->
    <circle cx="0" cy="0" r="90" fill="#FF5E00" opacity="0.3" filter="url(#hyperGlow)" />
    
    <!-- Planet Base -->
    <circle cx="0" cy="0" r="80" fill="url(#sunGrad)" />
    
    <!-- Shadow texture (implied 3D sphere) -->
    <path d="M-80,0 A80,80 0 0,0 80,0 A80,50 0 0,1 -80,0 Z" fill="#000" opacity="0.4"/>
    <path d="M-80,0 A80,80 0 0,0 80,0 A80,25 0 0,1 -80,0 Z" fill="#000" opacity="0.2"/>
    
    <!-- Futuristic Ring overlay -->
    <ellipse cx="0" cy="0" rx="160" ry="30" fill="none" stroke="url(#sunGrad)" stroke-width="4" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="160" ry="30" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="10,10" transform="rotate(-15)"/>
  </g>

  <!-- VFX Viewfinder brackets -->
  <path d="M 80,80 L 120,80 M 80,80 L 80,120" fill="none" stroke="#FF7B00" stroke-width="2.5" opacity="0.7"/>
  <path d="M 720,80 L 680,80 M 720,80 L 720,120" fill="none" stroke="#FF7B00" stroke-width="2.5" opacity="0.7"/>
  <path d="M 80,420 L 120,420 M 80,420 L 80,380" fill="none" stroke="#FF7B00" stroke-width="2.5" opacity="0.7"/>
  <path d="M 720,420 L 680,420 M 720,420 L 720,380" fill="none" stroke="#FF7B00" stroke-width="2.5" opacity="0.7"/>
  
  <text x="95" y="105" fill="#FF7B00" font-family="monospace" font-size="11" font-weight="700" letter-spacing="1">REC [VFX_SH_082]</text>
  <text x="705" y="105" fill="#fff" font-family="monospace" font-size="11" font-weight="700" text-anchor="end" letter-spacing="1">24 FPS | 4K HDR</text>

  <!-- Big Glassmorphic Play Button overlay in center -->
  <g transform="translate(400, 250)" cursor="pointer">
    <circle cx="0" cy="0" r="42" fill="#000" fill-opacity="0.5" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
    <circle cx="0" cy="0" r="34" fill="#fff" opacity="0.9" filter="url(#hyperGlow)"/>
    <!-- Triangle -->
    <polygon points="-8,-12 14,0 -8,12" fill="#0c0926" />
  </g>

  <!-- MOCK VIDEO EDITING TIMELINE FRAME (Bottom Overlay) -->
  <g transform="translate(60, 480)">
    <!-- Panel BG -->
    <rect x="0" y="0" width="680" height="90" rx="12" fill="url(#timelineGrad)" stroke="rgba(255,123,0,0.15)" stroke-width="1.5" />
    
    <!-- Timeline Tracks -->
    <!-- Video Track 1 -->
    <rect x="15" y="15" width="220" height="24" rx="4" fill="#FF7B00" fill-opacity="0.3" stroke="rgba(255,123,0,0.5)" stroke-width="1"/>
    <text x="25" y="31" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">V1: ORBITAL_INTRO.mp4</text>
    
    <rect x="245" y="15" width="310" height="24" rx="4" fill="#FF7B00" fill-opacity="0.5" stroke="#FF7B00" stroke-width="1"/>
    <text x="255" y="31" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">V2: VFX_SUN_EXPLOSION_COMP.exr</text>
    
    <rect x="565" y="15" width="100" height="24" rx="4" fill="#FF7B00" fill-opacity="0.3" stroke="rgba(255,123,0,0.5)" stroke-width="1"/>
    
    <!-- Audio Track 1 -->
    <rect x="15" y="48" width="540" height="24" rx="4" fill="#00C6FF" fill-opacity="0.3" stroke="rgba(0,198,255,0.5)" stroke-width="1"/>
    <!-- Mock Audio Wave lines -->
    <path d="M 30,60 L 50,60 L 60,54 L 70,66 L 80,60 L 150,60 L 160,52 L 170,68 L 180,60 L 250,60 Q 270,50 280,70 T 300,60 L 530,60" fill="none" stroke="#00C6FF" stroke-width="1.5"/>
    <text x="25" y="64" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">A1: OST_LAUNCH_MIX_STEREO.wav</text>

    <!-- Playhead vertical line -->
    <line x1="320" y1="-10" x2="320" y2="85" stroke="#fff" stroke-width="1.5" />
    <polygon points="314,-10 326,-10 320,-2" fill="#fff"/>
  </g>
</svg>
