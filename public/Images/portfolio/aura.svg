<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="auraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140f24" />
      <stop offset="60%" stop-color="#1b1236" />
      <stop offset="100%" stop-color="#0a0514" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE1A8" />
      <stop offset="50%" stop-color="#DFBA73" />
      <stop offset="100%" stop-color="#C2984A" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#auraBg)" />
  
  <!-- Decorative Abstract Curves (Luxury Brand Vibes) -->
  <path d="M-100,200 C150,150 250,350 500,250 C700,170 750,300 900,250" fill="none" stroke="rgba(223,186,115,0.06)" stroke-width="8" stroke-linecap="round"/>
  <path d="M-100,250 C200,200 300,450 600,300 C750,220 800,400 950,350" fill="none" stroke="rgba(168,85,247,0.05)" stroke-width="4" stroke-linecap="round"/>

  <!-- Background Glowing Orbs -->
  <circle cx="650" cy="180" r="180" fill="#a855f7" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="150" cy="400" r="220" fill="#DFBA73" opacity="0.08" filter="url(#softGlow)"/>

  <!-- BRAND BOOK MOCKUP PRESENTATION -->
  <g filter="url(#cardShadow)">
    <!-- Book Spread Background -->
    <rect x="80" y="80" width="640" height="440" rx="12" fill="#1b162f" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    
    <!-- Spine of the Book -->
    <line x1="400" y1="80" x2="400" y2="520" stroke="rgba(0,0,0,0.3)" stroke-width="3"/>
    <line x1="399" y1="80" x2="399" y2="520" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    
    <!-- LEFT PAGE: Logo Concept -->
    <!-- Grid on left page -->
    <g opacity="0.1">
      <line x1="120" y1="120" x2="360" y2="120" stroke="#fff" stroke-width="1"/>
      <line x1="120" y1="280" x2="360" y2="280" stroke="#fff" stroke-width="1"/>
      <line x1="120" y1="440" x2="360" y2="440" stroke="#fff" stroke-width="1"/>
      <line x1="120" y1="120" x2="120" y2="440" stroke="#fff" stroke-width="1"/>
      <line x1="240" y1="120" x2="240" y2="440" stroke="#fff" stroke-width="1"/>
      <line x1="360" y1="120" x2="360" y2="440" stroke="#fff" stroke-width="1"/>
    </g>
    
    <!-- Left Page Header -->
    <text x="120" y="115" fill="url(#goldGrad)" font-family="'Times New Roman', Georgia, serif" font-size="10" font-weight="700" letter-spacing="2">01 / LOGO ARCHITECTURE</text>
    
    <!-- Golden Geometric Abstract Flower (Brand Logo Icon) -->
    <g transform="translate(240, 240)">
      <!-- Outer Circle Guide -->
      <circle cx="0" cy="0" r="70" fill="none" stroke="rgba(223,186,115,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
      
      <!-- Intersecting Golden Petals -->
      <path d="M 0,-70 A 70,70 0 0,1 70,0 A 70,70 0 0,1 0,70 A 70,70 0 0,1 -70,0 A 70,70 0 0,1 0,-70 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.8"/>
      <path d="M -50,-50 A 70,70 0 0,1 50,-50 A 70,70 0 0,1 50,50 A 70,70 0 0,1 -50,50 A 70,70 0 0,1 -50,-50 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5" transform="rotate(45)"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="4" fill="url(#goldGrad)"/>
    </g>
    
    <!-- Brand Wordmark on Left Page -->
    <text x="240" y="375" fill="#fff" font-family="'Times New Roman', Georgia, serif" font-size="36" letter-spacing="8" font-weight="normal" text-anchor="middle">A U R A</text>
    <text x="240" y="395" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="9" letter-spacing="3" text-anchor="middle" text-transform="uppercase">Luxury Skin &amp; Beauty</text>

    <!-- RIGHT PAGE: Color Palette & Typography -->
    <!-- Right Page Header -->
    <text x="440" y="115" fill="url(#goldGrad)" font-family="'Times New Roman', Georgia, serif" font-size="10" font-weight="700" letter-spacing="2">02 / BRAND PALETTE</text>
    
    <!-- Color Swatches -->
    <!-- Swatch 1: Royal Violet -->
    <rect x="440" y="140" width="60" height="70" rx="4" fill="#1b1236" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="440" y="228" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Deep Violet</text>
    <text x="440" y="242" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="9">#1B1236</text>

    <!-- Swatch 2: Aura Gold -->
    <rect x="520" y="140" width="60" height="70" rx="4" fill="url(#goldGrad)" />
    <text x="520" y="228" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Imperial Gold</text>
    <text x="520" y="242" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="9">#DFBA73</text>

    <!-- Swatch 3: Soft Lavender -->
    <rect x="600" y="140" width="60" height="70" rx="4" fill="#E8DDF3" />
    <text x="600" y="228" fill="#fff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Lavender</text>
    <text x="600" y="242" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="9">#E8DDF3</text>
    
    <!-- Typography Specs -->
    <text x="440" y="290" fill="url(#goldGrad)" font-family="'Times New Roman', Georgia, serif" font-size="10" font-weight="700" letter-spacing="2">03 / TYPOGRAPHY</text>
    
    <!-- Typography Serif Sample -->
    <text x="440" y="335" fill="#fff" font-family="'Times New Roman', Georgia, serif" font-size="32" font-style="italic">Aa</text>
    <text x="490" y="322" fill="#fff" font-family="'Times New Roman', Georgia, serif" font-size="14" font-weight="600">Playfair Display</text>
    <text x="490" y="338" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10">Primary Editorial &amp; Headings</text>
    <text x="440" y="360" fill="rgba(255,255,255,0.3)" font-family="'Times New Roman', Georgia, serif" font-size="10" letter-spacing="0.5">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz</text>
    
    <!-- Typography Sans Sample -->
    <text x="440" y="415" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300">Aa</text>
    <text x="490" y="402" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Inter Regular</text>
    <text x="490" y="418" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10">Body copy &amp; Clean UI system</text>
    <text x="440" y="440" fill="rgba(255,255,255,0.3)" font-family="system-ui, sans-serif" font-size="9" letter-spacing="0.5">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz</text>

    <!-- Page Numbers at bottom -->
    <text x="120" y="495" fill="rgba(255,255,255,0.3)" font-family="system-ui, sans-serif" font-size="10">AURA BRAND SYSTEM v1.0</text>
    <text x="350" y="495" fill="rgba(255,255,255,0.3)" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">Page 07</text>
    
    <text x="440" y="495" fill="rgba(255,255,255,0.3)" font-family="system-ui, sans-serif" font-size="10">COLORS &amp; FONTS</text>
    <text x="670" y="495" fill="rgba(255,255,255,0.3)" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">Page 08</text>
  </g>
</svg>
