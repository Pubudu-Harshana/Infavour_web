<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="novaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e040f" />
      <stop offset="60%" stop-color="#24072b" />
      <stop offset="100%" stop-color="#08010d" />
    </linearGradient>
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7e5f" />
      <stop offset="100%" stop-color="#feb47b" />
    </linearGradient>
    <linearGradient id="viralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#novaBg)" />
  
  <!-- Glowing Background Orbs (Viral Sunsets) -->
  <circle cx="550" cy="200" r="180" fill="#f43f5e" opacity="0.12" filter="url(#neonGlow)"/>
  <circle cx="250" cy="400" r="220" fill="#fb923c" opacity="0.1" filter="url(#neonGlow)"/>

  <!-- Dynamic Diagonal Speedlines (Energetic Vibe) -->
  <g opacity="0.15" stroke="url(#viralGrad)" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="500" x2="250" y2="300"/>
    <line x1="150" y1="550" x2="400" y2="300"/>
    <line x1="600" y1="200" x2="750" y2="50"/>
    <line x1="500" y1="250" x2="700" y2="50"/>
  </g>

  <!-- FLOATING EMOTICONS / REACTIONS IN BUBBLES -->
  <!-- Fire Emoji Bubble -->
  <g transform="translate(180, 180)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="30" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <circle cx="0" cy="0" r="24" fill="#fb923c" opacity="0.2" filter="url(#neonGlow)"/>
    <text x="-12" y="11" font-size="28">🔥</text>
  </g>

  <!-- Heart Eyes Emoji Bubble -->
  <g transform="translate(620, 240)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="34" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <circle cx="0" cy="0" r="26" fill="#f43f5e" opacity="0.2" filter="url(#neonGlow)"/>
    <text x="-14" y="12" font-size="30">😍</text>
  </g>

  <!-- Sparkles Emoji Bubble -->
  <g transform="translate(200, 390)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <circle cx="0" cy="0" r="20" fill="#feb47b" opacity="0.2" filter="url(#neonGlow)"/>
    <text x="-10" y="8" font-size="22">✨</text>
  </g>

  <!-- VERTICAL SMARTPHONE MOCKUP -->
  <g transform="translate(320, 50)" filter="url(#shadow)">
    <!-- Phone Outer Shell -->
    <rect x="0" y="0" width="240" height="490" rx="36" fill="#0d0413" fill-opacity="0.8" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    
    <!-- Phone Screen area -->
    <rect x="8" y="8" width="224" height="474" rx="28" fill="#150824" overflow="hidden"/>
    
    <!-- Content inside Screen: Sunset Dynamic Gradient representing Video Track -->
    <rect x="8" y="8" width="224" height="474" rx="28" fill="url(#viralGrad)" opacity="0.8"/>
    
    <!-- Geometric shapes representing abstract video frame -->
    <ellipse cx="120" cy="220" rx="70" ry="110" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-dasharray="5,10"/>
    <circle cx="120" cy="220" r="50" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" filter="url(#neonGlow)"/>
    
    <!-- Soundwave element inside video -->
    <path d="M 60,320 L 70,300 L 80,330 L 90,290 L 100,340 L 110,270 L 120,350 L 130,280 L 140,330 L 150,295 L 160,310 L 170,300 L 180,320" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

    <!-- Screen Glass Shine overlay -->
    <path d="M 8,8 Q 120,40 232,8 L 232,150 Q 120,80 8,150 Z" fill="#fff" opacity="0.08" />

    <!-- Notch / Camera -->
    <rect x="90" y="8" width="60" height="18" rx="9" fill="#0d0413" />
    <circle cx="140" cy="17" r="3.5" fill="#1b1c40" />

    <!-- SOCIAL INTERFACE OVERLAYS (Reels/TikTok Mockup) -->
    <!-- Right sidebar: Action icons -->
    <!-- Profile avatar -->
    <circle cx="205" cy="260" r="14" fill="#fff" stroke="#f43f5e" stroke-width="1.5"/>
    <circle cx="205" cy="260" r="11" fill="#7C3AED" />
    <text x="205" y="278" fill="#fff" font-family="system-ui, sans-serif" font-weight="700" font-size="8" text-anchor="middle">+</text>

    <!-- Heart Icon -->
    <path d="M 205,302 C 205,302 198,296 195,293 C 192,290 192,286 195,283 C 198,280 202,280 205,284 C 208,280 212,280 215,283 C 218,286 218,290 215,293 Z" fill="#f43f5e" filter="url(#neonGlow)"/>
    <text x="205" y="318" fill="#fff" font-family="system-ui, sans-serif" font-weight="600" font-size="8" text-anchor="middle">4.2M</text>

    <!-- Comment Icon -->
    <circle cx="205" cy="336" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M 201,342 L 198,345 L 202,342 Z" fill="#fff" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="205" y="352" fill="#fff" font-family="system-ui, sans-serif" font-weight="600" font-size="8" text-anchor="middle">128K</text>

    <!-- Share Icon -->
    <polygon points="201,372 211,372 208,367" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M 199,380 Q 206,380 209,372" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text x="205" y="388" fill="#fff" font-family="system-ui, sans-serif" font-weight="600" font-size="8" text-anchor="middle">85K</text>

    <!-- User Caption & Music Track at Bottom left -->
    <text x="20" y="415" fill="#fff" font-family="system-ui, sans-serif" font-weight="700" font-size="10">@nova_creatives</text>
    <text x="20" y="432" fill="#fff" font-family="system-ui, sans-serif" font-size="9" opacity="0.9">Vibe shift is here! #motion #vfx #viral</text>
    <!-- Music disc spinning -->
    <circle cx="205" cy="430" r="10" fill="#000" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
    <circle cx="205" cy="430" r="4" fill="#fb923c" />
    <text x="20" y="450" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="8">♫ Original Sound - Nova Studios</text>
  </g>
</svg>
